<div class="forgot-password-container">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card forgot-password-card">
          <!-- Header -->
          <div class="card-header text-center">
            <h2 class="mb-2"><i class="fas fa-key"></i></h2>
            <h3>Reset Password</h3>
            <p class="text-muted small">Enter your email address to receive a password reset link.</p>
          </div>

          <div class="card-body">
            <!-- Error Message -->
            <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
              <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
              <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
            </div>

            <!-- Success Message -->
            <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
              <i class="fas fa-check-circle"></i> {{ successMessage }}
            </div>

            <!-- Forgot Password Form -->
            <form (ngSubmit)="onSubmit()" *ngIf="!successMessage" class="forgot-password-form">
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fas fa-envelope"></i>
                  </span>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Enter your email address"
                    [(ngModel)]="email"
                    name="email"
                    [class.is-invalid]="submitted && !email"
                    [disabled]="loading"
                  />
                </div>
                <div class="invalid-feedback" *ngIf="submitted && !email">
                  Email is required
                </div>
              </div>

              <button
                type="submit"
                class="btn btn-primary w-100 mb-3"
                [disabled]="loading"
              >
                <span *ngIf="!loading">
                  <i class="fas fa-paper-plane"></i> Send Reset Link
                </span>
                <span *ngIf="loading">
                  <i class="fas fa-spinner fa-spin"></i> Sending...
                </span>
              </button>
            </form>

            <!-- Login Link -->
            <div class="text-center">
              <p class="text-muted small mb-0">
                Remember your password?
                <a href="javascript:void(0)" (click)="goToLogin()" class="text-primary text-decoration-none">
                  Back to Login
                </a>
              </p>
            </div>
          </div>
        </div>

        <!-- Additional Help -->
        <div class="help-text text-center mt-4">
          <p class="small text-muted">
            <i class="fas fa-info-circle"></i>
            Check your email (including spam folder) for the password reset link.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
