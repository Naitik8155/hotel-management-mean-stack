<div class="login-container">
  <div class="background-elements">
    <div class="gradient-circle circle-1"></div>
    <div class="gradient-circle circle-2"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-content">
      <!-- Left Side - Branding -->
      <div class="login-branding">
        <div class="branding-content">
          <div class="hotel-icon">
            <i class="fas fa-hotel"></i>
          </div>
          <h1>Welcome Back</h1>
          <p>Login to manage your bookings and profile.</p>
          <div class="features-list">
            <div class="feature-item">
              <i class="fas fa-check-circle"></i>
              <span>Exclusive Deals</span>
            </div>
            <div class="feature-item">
              <i class="fas fa-check-circle"></i>
              <span>Easy Booking</span>
            </div>
            <div class="feature-item">
              <i class="fas fa-check-circle"></i>
              <span>24/7 Support</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Side - Login Form -->
      <div class="login-form-container">
        <div class="form-wrapper">
          <h2>Sign In</h2>
          <p class="form-subtitle">Enter your details to access your account</p>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <!-- Email Field -->
            <div class="form-group">
              <label for="email" class="form-label">
                <i class="fas fa-envelope"></i>
                Email Address
              </label>
              <div class="input-wrapper">
                <input type="email" class="form-input" id="email" formControlName="email" placeholder="Enter your email"
                  [class.error]="submitted && f['email'].errors" />
                <div *ngIf="submitted && f['email'].errors" class="error-message">
                  <span *ngIf="f['email'].errors['required']">Email is required</span>
                  <span *ngIf="f['email'].errors['email']">Email is invalid</span>
                </div>
              </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
              <label for="password" class="form-label">
                <i class="fas fa-lock"></i>
                Password
              </label>
              <div class="input-wrapper">
                <input type="password" class="form-input" id="password" formControlName="password"
                  placeholder="Enter your password" [class.error]="submitted && f['password'].errors" />
                <div *ngIf="submitted && f['password'].errors" class="error-message">
                  <span *ngIf="f['password'].errors['required']">Password is required</span>
                  <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
                </div>
              </div>
            </div>


            <!-- Submit Button -->
            <button type="submit" class="btn-login" [disabled]="loading">
              <span *ngIf="loading" class="spinner"></span>
              {{ loading ? 'Logging in...' : 'Sign In' }}
            </button>
          </form>

          <!-- Footer Links -->
          <div class="form-footer">
            <a href="/auth/forgot-password" class="forgot-password">Forgot password?</a>
            <div class="divider">or</div>
            <a href="/auth/register" class="register-link">Create an account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
