<div class="toast-container" *ngIf="toasts.length > 0">
    <div *ngFor="let toast of toasts" class="toast-item" [ngClass]="toast.type" role="alert" aria-live="assertive"
        aria-atomic="true">

        <div class="toast-icon">
            <i [class]="getIcon(toast.type)"></i>
        </div>

        <div class="toast-content">
            <div class="toast-title" *ngIf="toast.title">{{ toast.title }}</div>
            <div class="toast-message">{{ toast.message }}</div>
        </div>

        <button type="button" class="toast-close" (click)="remove(toast.id)" aria-label="Close">
            <i class="fas fa-times"></i>
        </button>

        <div class="toast-progress-bar">
            <div class="progress" [style.animationDuration.ms]="toast.duration || 5000"></div>
        </div>
    </div>
</div>
